[build]
command = "npm run build"
functions = "netlify/functions"
publish = "dist"

# Security Headers
[[headers]]
for = "/*"
[headers.values]
  X-Frame-Options = "DENY"
  X-XSS-Protection = "1; mode=block"
  X-Content-Type-Options = "nosniff"
  Referrer-Policy = "strict-origin-when-cross-origin"

# Canonical host: redirect the Netlify subdomain to the custom domain
[[redirects]]
from = "https://stirring-otter-3510b8.netlify.app/*"
to = "https://hooka.hypeakz.io/:splat"
status = 301
force = true

# SPA fallback for all other routes
# (/.netlify/* is reserved by Netlify and passes through automatically)
[[redirects]]
from = "/*"
to = "/index.html"
status = 200
